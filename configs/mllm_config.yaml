# configs/mllm_config.yaml

# --- Paths ---
paths:
  output_dir: "checkpoints"
  model_save_name: "mllm_flickr8k_v2.pth"
  captions_corpus_path: "./data/flickr8k/captions.txt"
  tokenizer_save_path: "checkpoints/flickr8k_tokenizer.json"
  best_model_save_path: 'checkpoints/mllm_flickr8k_v2_best.pth'

# --- Data ---
data:
  dataset_name: "flickr8k"
  data_root: "./data/flickr8k"

model:
  vision_encoder:
    vision_dim: 768
    n_layers: 8
    n_heads: 8
    dropout: 0.2
    d_ff: 2048
    image_size: 384
    patch_size: 16
    in_channels: 3
    num_classes: null

  language_model:
    n_layers: 6
    language_dim: 512
    n_heads: 8
    d_ff: 1536
    max_len: 1024
    dropout: 0.2

  connector:
    vision_dim: 768
    language_dim: 512
    type: "mlp"
    hidden_dim: 1024

# --- Training Strategy ---
training:
  freeze_vit: False
  freeze_llm: False
  device: "cuda"
  epochs: 15
  batch_size: 8
  learning_rate: 0.0003
  scheduler: cosine
  warmup_steps: 500
  weight_decay: 0.05
  grad_clip: 1.0
  num_workers: 4
  eval_interval: 1

# --- Inference ---
generation:
  # 修改为你自己的测试图片路径
  inference_image_path: "./data/flickr8k/Images/3637013_c675de7705.jpg"
  prompt: ""
  max_new_tokens: 100
  temperature: 0.7
  top_k: 200
